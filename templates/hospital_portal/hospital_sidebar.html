<aside class="w-72 bg-white border-r flex flex-col justify-between" style="border-color:#F0DEE2;">

    <div>
        <div class="p-8">
            <h2 class="text-2xl font-heading font-bold" style="color:#E1315B;">
                Meri Aama
            </h2>
            <p class="text-sm" style="color:#8C7480;">
                Hospital Portal
            </p>
        </div>

        <nav class="px-4 space-y-1">
            <a href="{% url 'hospital-dashboard' %}"
               class="flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-colors"
               style="{% if request.resolver_match.url_name == 'hospital-dashboard' %}background:#FBE4E9; color:#E1315B;{% else %}color:#3B1E2F;{% endif %}"
               onmouseover="if(!this.style.background.includes('251')) this.style.background='#F7EEF0'"
               onmouseout="this.style.background='{% if request.resolver_match.url_name == "hospital-dashboard" %}#FBE4E9{% else %}transparent{% endif %}'">
                <i data-lucide="layout-dashboard" class="w-[18px] h-[18px]"></i>
                Dashboard
            </a>

            {% if request.user.is_hospital_admin %}
            <a href="{% url 'hospital-staff-approvals' %}"
               class="flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-colors"
               style="{% if request.resolver_match.url_name == 'hospital-staff-approvals' %}background:#FBE4E9; color:#E1315B;{% else %}color:#3B1E2F;{% endif %}"
               onmouseover="if(!this.style.background.includes('251')) this.style.background='#F7EEF0'"
               onmouseout="this.style.background='{% if request.resolver_match.url_name == "hospital-staff-approvals" %}#FBE4E9{% else %}transparent{% endif %}'">
                <i data-lucide="user-check" class="w-[18px] h-[18px]"></i>
                Staff Approvals
                {% if pending_count %}
                <span class="ml-auto text-xs text-white rounded-full px-2 py-0.5" style="background:#E1315B;">{{ pending_count }}</span>
                {% endif %}
            </a>
            {% endif %}
        </nav>
    </div>

    <div class="p-4 border-t" style="border-color:#F0DEE2;">
        <div class="flex items-center gap-3 px-4 py-2 mb-1">
            <div class="w-9 h-9 rounded-full flex items-center justify-center font-heading font-semibold shrink-0"
                 style="background:#FBE4E9; color:#E1315B;">
                {{ request.user.username|first|upper }}
            </div>
            <div class="min-w-0">
                <p class="text-sm font-medium truncate" style="color:#3B1E2F;">{{ request.user.username }}</p>
                <p class="text-xs" style="color:#8C7480;">{{ request.user.get_role_display }}</p>
            </div>
        </div>
        <a href="{% url 'logout' %}"
           class="flex items-center gap-3 px-4 py-2.5 rounded-xl font-medium text-sm hover:bg-[#FBE4E9] transition-colors"
           style="color:#C0304F;">
            <i data-lucide="log-out" class="w-[18px] h-[18px]"></i>
            Logout
        </a>
    </div>

</aside>
