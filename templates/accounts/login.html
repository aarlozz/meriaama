{% extends "base.html" %}
{% block title %}Login - Meri Aama{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto bg-white p-6 rounded-lg shadow">
    <h1 class="text-2xl font-bold text-rose-700 mb-6">Welcome back</h1>

    {% if form.errors %}
        <div class="mb-4 px-3 py-2 rounded bg-red-100 text-red-700 text-sm">
            Incorrect username or password.
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <label class="block text-sm font-medium mb-1">Username</label>
        <input type="text" name="username" class="w-full border rounded px-3 py-2 mb-4" required>

        <label class="block text-sm font-medium mb-1">Password</label>
        <input type="password" name="password" class="w-full border rounded px-3 py-2 mb-4" required>

        <button type="submit" class="w-full bg-rose-600 text-white rounded px-3 py-2 font-medium hover:bg-rose-700">
            Log in
        </button>
    </form>

    <p class="text-sm text-gray-600 mt-4">
        New here? <a href="{% url 'register-page' %}" class="text-rose-600 hover:underline">Create an account</a>
    </p>
</div>
{% endblock %}
