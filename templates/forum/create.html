{% extends "base.html" %}
{% block title %}New Post{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-rose-700 mb-6">Share with the Community</h1>

<form method="post" class="bg-white p-6 rounded-lg shadow">
    {% csrf_token %}
    {% for field in form %}
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p class="text-xs text-red-600 mt-1">{{ field.errors|striptags }}</p>
            {% endif %}
        </div>
    {% endfor %}
    <button type="submit" class="bg-rose-600 text-white rounded px-4 py-2 font-medium hover:bg-rose-700">
        Post
    </button>
</form>
{% endblock %}
