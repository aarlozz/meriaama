    {% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Meri Aama{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="bg-rose-50 min-h-screen">

    {% if messages %}
        {% for message in messages %}
            <div class="fixed top-5 right-5 z-50 rounded-xl border border-amber-300 bg-amber-100 px-5 py-3 shadow-lg">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}

    <script src="{% static 'js/main.js' %}"></script>

</body>
</html>
