<!-- ========================================= -->
<!-- Top Header -->
<!-- ========================================= -->

<header class="bg-white border-b border-rose-100 px-8 py-5">

    <div class="flex items-center justify-between">

        <!-- Left -->
        <div>
<h1 class="text-4xl font-bold">
    {{ header_title|default:"Dashboard" }}
</h1>

<p class="text-gray-500">
    {{ header_subtitle|default:"Welcome back to Meri Aama" }}
</p>
</div>

        <!-- Right -->

        <div class="flex items-center gap-6">

            <!-- Search -->

            <div class="hidden lg:block relative">

                <input
                    type="text"
                    placeholder="Search..."
                    class="w-72 rounded-xl border border-gray-200 bg-gray-50 py-3 pl-11 pr-4 focus:border-rose-400 focus:ring-4 focus:ring-rose-100 outline-none transition">

                <span class="absolute left-4 top-3.5 text-gray-400">

                    🔍

                </span>

            </div>

<!-- Profile -->
<div class="relative inline-block">
    <button id="profileBtn"
        class="flex items-center gap-4 rounded-2xl border border-rose-100 bg-rose-50 px-4 py-3 hover:bg-rose-100 transition">

        <div
            class="flex h-12 w-12 items-center justify-center rounded-full bg-gradient-to-r from-rose-500 to-pink-500 text-lg font-bold text-white">
            {{ request.user.username|first|upper }}
        </div>

        <div class="text-left">
            <p class="font-semibold text-gray-800">
                {{ request.user.first_name|default:request.user.username }}
            </p>

            <p class="text-sm text-gray-500">
                Mother Account
            </p>
        </div>

    </button>

    <!-- Dropdown -->
<!-- Dropdown -->
<div id="profileMenu"
    class="hidden absolute right-0 top-full mt-3 w-72 rounded-2xl bg-white border border-gray-100 shadow-2xl overflow-hidden z-50">

    <!-- User Info -->
    <div class="px-5 py-5 bg-gradient-to-r from-rose-50 to-pink-50">

        <div class="flex items-center gap-3">

            <div class="h-14 w-14 rounded-full bg-gradient-to-r from-rose-500 to-pink-500
                        flex items-center justify-center text-xl font-bold text-white">
                {{ request.user.username|first|upper }}
            </div>

            <div>
                <h3 class="font-semibold text-gray-800">
                    {{ request.user.first_name|default:request.user.username }}
                </h3>

                <p class="text-sm text-gray-500">
                    {{ request.user.email }}
                </p>
            </div>

        </div>

    </div>

    <!-- Menu -->

    <div class="py-2">

        <a href="{% url 'health-profile' %}"
           class="flex items-center gap-3 px-5 py-3 hover:bg-rose-50 transition">

            👤
            <span>My Profile</span>

        </a>

        <a href="#"
           class="flex items-center gap-3 px-5 py-3 hover:bg-rose-50 transition">

            📊
            <span>Dashboard</span>

        </a>

        <a href="#"
           class="flex items-center gap-3 px-5 py-3 hover:bg-rose-50 transition">

            ⚙️
            <span>Settings</span>

        </a>

        <a href="#"
           class="flex items-center gap-3 px-5 py-3 hover:bg-rose-50 transition">

            ❓
            <span>Help Center</span>

        </a>

    </div>

    <!-- Logout -->

    <div class="border-t">

        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}

            <button
                class="w-full flex items-center gap-3 px-5 py-3 text-red-600 hover:bg-red-50 transition">

                🚪
                <span>Logout</span>

            </button>

        </form>

    </div>

</div>

</div>

        </div>

    </div>

</header>
