{% extends "dashboard_base.html" %}
{% block title %}{% block page_title %}Dashboard{% endblock %} -- Meri Aama{% endblock %}
{% block content %}


<div class="lg:flex lg:gap-0 -m-4 sm:-m-6 lg:-m-8 min-h-screen bg-gray-50">

    <!-- Mobile top bar -->
    <div class="lg:hidden sticky top-0 z-30 bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between">
        <span class="font-bold text-rose-700 text-lg">Meri Aama</span>
        <button id="sidebarToggle" class="p-2 rounded-lg hover:bg-gray-50" aria-label="Open menu">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
    </div>

    <!-- Sidebar backdrop (mobile only) -->
    <div id="sidebarBackdrop" class="fixed inset-0 bg-black/30 z-40 hidden lg:hidden"></div>



    <!-- Main content -->
    <main class="flex-1 min-w-0 p-6 lg:p-8">
        <div class="w-full">
            {% block dashboard_content %}{% endblock %}
        </div>
    </main>
</div>

<script>
(function () {
    var sidebar = document.getElementById('sidebar');
    var backdrop = document.getElementById('sidebarBackdrop');
    var openBtn = document.getElementById('sidebarToggle');
    var closeBtn = document.getElementById('sidebarClose');

    function open() {
        sidebar.classList.remove('-translate-x-full');
        backdrop.classList.remove('hidden');
    }
    function close() {
        sidebar.classList.add('-translate-x-full');
        backdrop.classList.add('hidden');
    }

    if (openBtn) openBtn.addEventListener('click', open);
    if (closeBtn) closeBtn.addEventListener('click', close);
    if (backdrop) backdrop.addEventListener('click', close);
})();
</script>
{% endblock %}
